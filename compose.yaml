services:
  aistor-server:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./minio/data:/mnt/data
      - ./minio/minio.license:/minio.license
    command:
      - server
      - /mnt/data
      - --license
      - /minio.license
    networks:
      - app-network

  server:
    build:
      context: .
      target: final
    ports:
      - 8080:8080
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=example
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 5432
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - app-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Waiting for Ollama...';
        while ! curl -s http://ollama:11434/api/tags > /dev/null; do sleep 1; done;
        echo 'Pulling gemma2:2b (approx 1.6GB)...';
        ollama pull gemma2:2b;
        echo 'Model ready. Exiting init container.'
      "
    networks:
      - app-network

# The commented out section below is an example of how to define a PostgreSQL
# database that your application can use. `depends_on` tells Docker Compose to
# start the database before your application. The `db-data` volume persists the
# database data between container restarts. The `db-password` secret is used
# to set the database password. You must create `db/password.txt` and add
# a password of your choosing to it before running `docker compose up`.

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  ollama-data:

secrets:
  db-password:
    file: db/password.txt

