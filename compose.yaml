services:
  aistor-server:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./minio/data:/mnt/data
      - ./minio/minio.license:/minio.license
    command:
      - server
      - /mnt/data
      - --license
      - /minio.license
    networks:
      - app-network

  server:
    build:
      context: .
      target: final
    ports:
      - 8080:8080
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=example
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 5432
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - app-network

# docker compose exec ollama ollama pull gemma2:2b

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  ollama-data:

secrets:
  db-password:
    file: db/password.txt

